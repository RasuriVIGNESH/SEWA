spring.application.name=sewa

server.port=4354

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


fhir.server.url=${FHIR_SERVER_URL}
fhir.poll.interval-ms=3000


jwt.secret=JWT_SECRET_KEY
jwt.expiry-ms=86400000

spring.websocket.max-text-message-size=65536

logging.level.com.vignesh.sewa=DEBUG
logging.level.ca.uhn.fhir=WARN